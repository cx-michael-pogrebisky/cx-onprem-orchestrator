# goreleaser config for cx-onprem-orchestrator.
# Produces static, zero-dependency binaries for linux/darwin/windows × amd64/arm64,
# checksums, a cosign signature (keyless), and an SBOM. The slim + fat docker images
# are built/pushed from source by a separate release-workflow job (our Dockerfiles
# build from the repo, not from the goreleaser dist context). A Homebrew tap can be
# added here once a `homebrew-tap` repo exists. Run: `goreleaser release --clean`.
version: 2

project_name: cx-onprem-orchestrator

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: cx-onprem-orchestrator
    main: ./cmd/cx-onprem-orchestrator
    binary: cx-onprem-orchestrator
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/cx-michael-pogrebisky/cx-onprem-orchestrator/internal/cli.Version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    # Version-LESS archive names so the GitHub "latest release" download URLs are
    # permanent and never go stale, e.g.
    #   https://github.com/<owner>/<repo>/releases/latest/download/cx-onprem-orchestrator_linux_amd64.tar.gz
    # Docs reference those stable URLs (see README), so no doc edit is needed per release.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE*, README*]

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Sign the checksums file with cosign (keyless OIDC in CI).
signs:
  - cmd: cosign
    artifacts: checksum
    args: ["sign-blob", "--yes", "--output-signature=${signature}", "${artifact}"]

sboms:
  - artifacts: archive

release:
  draft: false       # publish the release directly (1.0.0 GA)
  mode: replace
