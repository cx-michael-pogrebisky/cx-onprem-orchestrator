name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: "1.26", cache: true }
      - run: go vet ./...
      - run: go test -race ./...
      - name: cross-compile matrix (zero-dependency static binaries)
        run: make dist

  verify-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: "1.26", cache: true }
      # Fails if a pinned docker image digest in manifest.lock has drifted.
      - run: go run ./hack/verify-pins
