name: release

# Tag-triggered release: goreleaser builds the cross-platform binaries, signs the
# checksums with cosign (keyless OIDC), generates SBOMs, and publishes the slim +
# fat docker images to GHCR.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release + upload assets
  packages: write   # push images to ghcr.io
  id-token: write   # cosign keyless signing via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@v5
        with: { go-version: "1.26", cache: true }

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The fat image fetches engine tools from github.com/checkmarx + S3 + docker.io.
      - uses: docker/setup-buildx-action@v3

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For the Homebrew tap push, set a PAT with repo scope on the tap:
          # HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
