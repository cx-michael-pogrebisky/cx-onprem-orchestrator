<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cx-onprem-orchestrator — configuration builder</title>
<script>
  // Set the theme before first paint to avoid a flash. "system" follows the
  // OS/browser (prefers-color-scheme); "light"/"dark" force it.
  try { document.documentElement.setAttribute("data-theme", localStorage.getItem("cxoo-theme") || "system"); }
  catch (e) { document.documentElement.setAttribute("data-theme", "system"); }
</script>
<style>
  /* Dark palette (default). */
  :root {
    --bg:#0e1116; --panel:#161b22; --panel2:#1c2230; --line:#2b3340; --fg:#e6edf3;
    --muted:#9aa7b4; --accent:#4c8eff; --accent2:#3fb950; --warn:#d29922; --code:#0a0d12;
    --chip-on-fg:#cfe0ff; --warn-fg:#f0d488; --ok-fg:#a5e0ad; --info-fg:#bcd4ff; --err-fg:#ffb3ad;
    color-scheme: dark;
  }
  /* Light palette: applied when the user picks Light, or picks System and the
     OS/browser prefers light. */
  :root[data-theme="light"],
  :root[data-theme="system"] { color-scheme: light dark; }
  @media (prefers-color-scheme: light) {
    :root[data-theme="system"] {
      --bg:#ffffff; --panel:#f6f8fa; --panel2:#eaeef2; --line:#d0d7de; --fg:#1f2328;
      --muted:#57606a; --accent:#0969da; --accent2:#1a7f37; --warn:#9a6700; --code:#eff2f5;
      --chip-on-fg:#0969da; --warn-fg:#7a5c00; --ok-fg:#1a7f37; --info-fg:#0a52c2; --err-fg:#b62324;
      color-scheme: light;
    }
  }
  :root[data-theme="light"] {
    --bg:#ffffff; --panel:#f6f8fa; --panel2:#eaeef2; --line:#d0d7de; --fg:#1f2328;
    --muted:#57606a; --accent:#0969da; --accent2:#1a7f37; --warn:#9a6700; --code:#eff2f5;
    --chip-on-fg:#0969da; --warn-fg:#7a5c00; --ok-fg:#1a7f37; --info-fg:#0a52c2; --err-fg:#b62324;
    color-scheme: light;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:16px 20px; border-bottom:1px solid var(--line); background:var(--panel); position:relative; }
  header h1 { margin:0; font-size:18px; padding-right:160px; }
  header .sub { color:var(--muted); font-size:12.5px; margin-top:3px; padding-right:160px; }
  .theme-pick { position:absolute; right:20px; top:14px; display:flex; gap:6px; align-items:center; }
  .theme-pick label { margin:0; color:var(--muted); font-size:12px; }
  .theme-pick select { width:auto; padding:5px 8px; }
  .wrap { display:grid; grid-template-columns: minmax(360px,1fr) minmax(420px,1.1fr); gap:0; min-height:calc(100vh - 70px); }
  .form { padding:18px 20px; overflow:auto; border-right:1px solid var(--line); }
  .out  { padding:18px 20px; background:var(--panel); position:sticky; top:0; align-self:start; height:calc(100vh - 70px); overflow:auto; }
  @media (max-width:920px){ .wrap{ grid-template-columns:1fr; } .out{ position:static; height:auto; } }
  fieldset { border:1px solid var(--line); border-radius:8px; margin:0 0 16px; padding:12px 14px; background:var(--panel2); }
  legend { padding:0 6px; color:var(--accent); font-weight:600; font-size:12.5px; text-transform:uppercase; letter-spacing:.04em; }
  label { display:block; margin:8px 0 3px; font-size:12.5px; color:var(--muted); }
  input[type=text], input[type=number], select {
    width:100%; padding:7px 9px; background:var(--code); color:var(--fg);
    border:1px solid var(--line); border-radius:6px; font:inherit; }
  input[type=text]:focus, select:focus, input[type=number]:focus { outline:1px solid var(--accent); }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .row > * { flex:1 1 auto; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .chip { display:inline-flex; align-items:center; gap:6px; background:var(--code); border:1px solid var(--line);
          border-radius:999px; padding:5px 10px; cursor:pointer; user-select:none; font-size:12.5px; }
  .chip input { accent-color:var(--accent); }
  .chip.on { border-color:var(--accent); color:var(--chip-on-fg); }
  .chip input:disabled + span, .chip input:disabled { opacity:.7; }
  .fmt-group { margin:8px 0 10px; }
  .fmt-eng { font-size:12px; color:var(--fg); margin-bottom:4px; font-weight:600; }
  .seg { display:flex; flex-wrap:wrap; gap:6px; }
  .seg button { background:var(--code); border:1px solid var(--line); color:var(--fg); border-radius:6px;
                padding:6px 10px; cursor:pointer; font-size:12.5px; }
  .seg button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .seg button:disabled { opacity:.4; cursor:not-allowed; }
  .thr-row { display:grid; grid-template-columns: 1fr 1fr 70px 28px; gap:6px; margin-top:6px; align-items:center; }
  .pass-row { display:grid; grid-template-columns: 1fr 2fr 28px; gap:6px; margin-top:6px; align-items:center; }
  button.mini { background:var(--code); border:1px solid var(--line); color:var(--fg); border-radius:6px; cursor:pointer; padding:6px 8px; }
  button.add { background:transparent; border:1px dashed var(--line); color:var(--muted); width:100%; padding:7px; border-radius:6px; cursor:pointer; margin-top:8px; }
  .hint { color:var(--muted); font-size:11.5px; margin-top:4px; }
  .out h2 { margin:0 0 6px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .filename { color:var(--accent2); font-size:12px; margin-bottom:8px; word-break:break-all; }
  pre { background:var(--code); border:1px solid var(--line); border-radius:8px; padding:14px; overflow:auto;
        font:12.5px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; white-space:pre; margin:0; }
  .toolbar { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  .toolbar button { background:var(--accent); border:none; color:#fff; border-radius:6px; padding:8px 12px; cursor:pointer; font-weight:600; }
  .toolbar button.ghost { background:var(--code); border:1px solid var(--line); color:var(--fg); font-weight:400; }
  .notes { margin-top:12px; }
  .note { background:rgba(210,153,34,.12); border:1px solid rgba(210,153,34,.45); color:var(--warn-fg);
          border-radius:6px; padding:8px 10px; font-size:12px; margin-top:8px; }
  .note.ok { background:rgba(63,185,80,.12); border-color:rgba(63,185,80,.45); color:var(--ok-fg); }
  .note.info { background:rgba(76,142,255,.12); border-color:rgba(76,142,255,.45); color:var(--info-fg); }
  .note.err { background:rgba(248,81,73,.14); border-color:rgba(248,81,73,.65); color:var(--err-fg); font-weight:600; }
  .out.incomplete pre { border-color:#f85149; box-shadow:0 0 0 1px #f85149 inset; }
  #outHead.bad { color:var(--err-fg); }
  input.bad-input { border-color:#f85149; outline:1px solid #f85149; background:rgba(248,81,73,.06); }
  a { color:var(--accent); }
  code { background:var(--code); padding:1px 5px; border-radius:4px; font-family:ui-monospace,monospace; font-size:12px; }
  details { margin-top:6px; } summary { cursor:pointer; color:var(--muted); font-size:12.5px; }
</style>
</head>
<body>
<header>
  <div class="theme-pick">
    <label for="theme">Theme</label>
    <select id="theme" title="Theme — System follows your OS/browser">
      <option value="system">System</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </div>
  <h1>cx-onprem-orchestrator — configuration builder</h1>
  <div class="sub">Pick a target, OS, runtime, and options — get a ready-to-paste config. Runs entirely in your browser; real secrets are referenced by env-var name only, never entered here. <span id="schemaVer"></span></div>
</header>

<div class="wrap">
  <div class="form" id="form"><!-- controls injected --></div>
  <div class="out">
    <div class="toolbar">
      <button id="copyBtn">Copy</button>
      <button id="dlBtn" class="ghost">Download</button>
      <span class="hint" id="copyState"></span>
    </div>
    <h2 id="outHead">Generated configuration</h2>
    <div class="filename" id="filename"></div>
    <pre id="output">…</pre>
    <div class="notes" id="notes"></div>
  </div>
</div>

<script id="cxoo-schema" type="application/json">__CXOO_SCHEMA__</script>
<script>
"use strict";
const SCHEMA = JSON.parse(document.getElementById("cxoo-schema").textContent);

/* ---------- target / OS / runtime descriptors ---------- */
// runtime: 'docker' | 'podman' | 'native'
const OSES = [
  { id:"linux",   label:"Linux" },
  { id:"macos",   label:"macOS" },
  { id:"windows", label:"Windows" },
];

// Per-CI descriptor. render is chosen by family + runtime + os.
// containerImageRef: how the job names the fat image (image-directive) — null = use a `run` script step.
const IMG = "ghcr.io/cx-michael-pogrebisky/cx-onprem-orchestrator:fat";
const TARGETS = {
  local:     { label:"Local invocation", family:"local" },
  github:    { branchVar:"$GITHUB_REF_NAME", label:"GitHub Actions",   family:"ci", file:".github/workflows/checkmarx.yml", lang:"yaml",
               winHosted:true, winLabel:"windows-latest", winShell:"pwsh",
               note:"Hosted Ubuntu runners ship Podman; the job-level container: is Docker/Moby and can't be swapped on hosted runners." },
  gitlab:    { branchVar:"$CI_COMMIT_REF_NAME", label:"GitLab CI", family:"ci", file:".gitlab-ci.yml", lang:"yaml",
               winHosted:true, winLabel:"saas-windows-medium-amd64", winShell:"powershell",
               note:"Shared runners' image: is Docker-backed; choose the runtime with a self-hosted runner." },
  azure:     { branchVar:"$(Build.SourceBranchName)", label:"Azure DevOps", family:"ci", file:"azure-pipelines.yml", lang:"yaml",
               winHosted:true, winLabel:"windows-latest", winShell:"pwsh",
               note:"Microsoft-hosted container jobs are Docker-backed; for Podman use a script step or self-hosted agent." },
  jenkins:   { branchVar:"${BRANCH_NAME:-${GIT_BRANCH#origin/}}", label:"Jenkins", family:"jenkins", file:"Jenkinsfile", lang:"groovy",
               winHosted:false, winLabel:"windows", winShell:"bat",
               note:"No hosted runners — you own the agents, so install Podman or Docker as you prefer." },
  bamboo:    { branchVar:"$bamboo_planRepository_branchName", label:"Bamboo", family:"ci-script", file:"(Bamboo Script task)", lang:"bash",
               winHosted:false, winLabel:"a Windows remote agent", winShell:"bat",
               note:"Self-hosted remote agents only; pick the runtime you install." },
  bitbucket: { branchVar:"$BITBUCKET_BRANCH", label:"Bitbucket Pipelines", family:"ci", file:"bitbucket-pipelines.yml", lang:"yaml",
               winHosted:false, winLabel:"a self-hosted Windows runner", winShell:"powershell", linuxOnlyCloud:true,
               note:"Cloud Pipelines are Linux/Docker only and can't use Podman; for Podman or Windows use a self-hosted runner." },
  teamcity:  { branchVar:"%teamcity.build.branch%", label:"TeamCity", family:"ci-script", file:"(TeamCity Command Line step)", lang:"bash",
               winHosted:true, winLabel:"a Windows agent", winShell:"powershell",
               note:"On self-hosted agents you choose the runtime." },
  buildkite: { branchVar:"$BUILDKITE_BRANCH", label:"Buildkite", family:"ci", file:".buildkite/pipeline.yml", lang:"yaml",
               winHosted:false, winLabel:"a self-hosted Windows agent", winShell:"powershell",
               note:"Hosted agents are Linux+macOS only; Windows via self-hosted agents." },
  codebuild: { label:"AWS CodeBuild", family:"ci", file:"buildspec.yml", lang:"yaml",
               winHosted:true, winLabel:"WINDOWS_SERVER_2022_CONTAINER", winShell:"powershell", winIsContainer:true,
               note:"CodeBuild Windows environments are WINDOWS containers and cannot run the linux/amd64 image — use the native binary there." },
  circleci:  { branchVar:"$CIRCLE_BRANCH", label:"CircleCI", family:"ci", file:".circleci/config.yml", lang:"yaml",
               winHosted:true, winLabel:"win/server-2022", winShell:"powershell",
               note:"The hosted Windows VM executor is fixed; for Podman use a self-hosted runner." },
  travis:    { branchVar:"$TRAVIS_BRANCH", label:"Travis CI", family:"ci", file:".travis.yml", lang:"yaml",
               winHosted:true, winLabel:"os: windows", winShell:"powershell",
               note:"On Linux workers, services: [docker]; install Podman to use it instead." },
  drone:     { branchVar:"$DRONE_BRANCH", label:"Drone CI", family:"ci", file:".drone.yml", lang:"yaml",
               winHosted:false, winLabel:"platform os: windows", winShell:"powershell",
               note:"Windows is self-hosted only (not on Drone Cloud)." },
  semaphore: { branchVar:"$SEMAPHORE_GIT_BRANCH", label:"Semaphore", family:"ci", file:".semaphore/semaphore.yml", lang:"yaml",
               winHosted:false, winLabel:"a self-hosted Windows agent", winShell:"powershell", linuxOnlyCloud:true,
               note:"Cloud is Linux/macOS only; Windows via a self-hosted agent." },
  appveyor:  { branchVar:"$APPVEYOR_REPO_BRANCH", label:"AppVeyor", family:"ci", file:"appveyor.yml", lang:"yaml",
               winHosted:true, winLabel:"Visual Studio 2022", winShell:"cmd", winFirst:true,
               note:"AppVeyor is Windows-first; the fat image needs a Linux image (image: Ubuntu)." },
  codefresh: { branchVar:"${{CF_BRANCH}}", label:"Codefresh", family:"ci", file:"codefresh.yml", lang:"yaml",
               winHosted:false, winLabel:"a Windows runtime (gated)", winShell:"powershell", linuxOnlyCloud:true,
               note:"Standard runtime is Linux/Docker; Windows is gated/incubation." },
};

/* ---------- default state ---------- */
const state = {
  target:"local", os:"linux", runtime:"docker",
  scanners:{ sast:true, sca:true, kics:true, secrets:true, containers:true },
  source:"", projectName:"", sastProjectName:"", cxProjectName:"", branch:"",
  thresholds:[ {engine:"sast", sev:"critical", limit:"1"} ],
  filters:{}, // flagName -> value
  // engineFormats: per-engine selected report formats (engine token -> {fmt:bool}),
  // seeded from each engine's effective default. Populated below once SCHEMA is read.
  engineFormats:{},
  outputPath:"", outputName:"",
  parallel:"8", failFast:false, timeout:"", onMissing:"", conflict:"", async:false, ignoreOnExit:"",
  auth:"apikey", // apikey | client-creds | (cxsast is always shown for sast)
  authEnv:{ apikey:"CX1_APIKEY", clientId:"", clientSecretEnv:"CX_CLIENT_SECRET", baseUri:"", baseAuthUri:"", tenant:"" },
  sast:{ server:"", user:"", userEnv:"CXSAST_USERNAME", passEnv:"CXSAST_PASSWORD", team:"CxServer", java:"" },
  tools:{ scaResolver:"", sastPath:"", kicsQueries:"" },
  passthrough:[], // {engine, value}
};
// Seed per-engine report-format selections from each engine's effective default.
SCHEMA.engines.forEach(e => { state.engineFormats[e] = effectiveDefaultFormats(e); });

/* ---------- helpers ---------- */
const ENGINE_LABELS = { sast:"SAST (CxSAST)", sca:"SCA", kics:"KICS (IaC)", secrets:"Secrets (2ms)", containers:"Container Security" };
const flagDefault = (name) => { const f = SCHEMA.flags.find(x=>x.name===name); return f ? f.default : ""; };
const flagUsage = (name) => { const f = SCHEMA.flags.find(x=>x.name===name); return f ? f.usage : ""; };
function el(tag, attrs={}, ...kids){ const e=document.createElement(tag);
  for(const k in attrs){ if(k==="class")e.className=attrs[k]; else if(k==="html")e.innerHTML=attrs[k]; else e.setAttribute(k,attrs[k]); }
  for(const c of kids){ if(c==null)continue; e.append(c.nodeType?c:document.createTextNode(c)); } return e; }

// Per-engine report-format support from the schema (source of truth).
function engineFmtInfo(tok){ return (SCHEMA.engineReportFormats && SCHEMA.engineReportFormats[tok]) || {mandatory:"json", supported:["json"]}; }
// Effective default formats for an engine = its mandatory + (json,sarif ∩ supported),
// mirroring the CLI's default --report-formats json,sarif piped through SelectFormats.
function effectiveDefaultFormats(tok){
  const info=engineFmtInfo(tok); const sel={};
  if(info.mandatory) sel[info.mandatory]=true;
  for(const f of ["json","sarif"]) if(info.supported.includes(f)) sel[f]=true;
  return sel;
}
function sameSet(a,b){ if(a.length!==b.length) return false; const s=new Set(a); return b.every(x=>s.has(x)); }

const needsQuote = (v) => v==="" || /[^A-Za-z0-9_,.:@/=+-]/.test(v);
function qBash(v){ if(!needsQuote(v))return v; return '"'+v.replace(/(["\\$`])/g,"\\$1")+'"'; }
function qPwsh(v){ if(!needsQuote(v))return v; return '"'+v.replace(/"/g,'""')+'"'; }
function qYaml(v){ return v; } // values live inside block scalars; no quoting needed

/* Render one {flag,value} pair into a token. branchExpr values are CI/shell
   variable expressions (e.g. "$CI_COMMIT_REF_NAME") that must expand at run time,
   so they are wrapped in double quotes WITHOUT escaping the $ — used for the
   per-CI branch fallback. q is the per-mode quoter for normal values. */
function argTok(p, q){
  if(p.value===null) return p.flag;
  if(p.branchExpr) return p.flag+' "'+p.value+'"';
  if(p.raw) return p.flag+"="+q(p.value);
  return p.flag+" "+q(p.value);
}

/* Effective output path. Blank means: local → let the CLI default it OUTSIDE the
   source tree (a sibling dir); CI → a distinctive in-workspace dir the orchestrator
   excludes from scans (so artifacts upload while reports are never scanned). */
function effectiveOutputPath(){
  if(state.outputPath) return state.outputPath;
  return state.target==="local" ? "" : "cxoo-reports";
}

/* Build the engine/threshold argument pairs (binary-agnostic). */
function selectedEngines(){ return SCHEMA.engines.filter(e=>state.scanners[e]); }
function thresholdString(){
  return state.thresholds.filter(t=>t.engine&&t.sev!==undefined&&t.limit!=="")
    .map(t=> t.engine==="secrets-total" ? "secrets-total="+t.limit : t.engine+"-"+t.sev+"="+t.limit ).join(";");
}

/* Returns ordered array of {flag, value|null}. value null => valueless (bool/flag-only). */
function buildArgPairs(){
  const a=[]; const eng=selectedEngines();
  a.push({flag:"--scanners", value: eng.length===SCHEMA.engines.length ? "all" : eng.join(",")});
  const thr=thresholdString(); if(thr) a.push({flag:"--threshold", value:thr});
  if(state.source) a.push({flag:"--source", value:state.source});
  if(state.projectName) a.push({flag:"--project-name", value:state.projectName});
  if(state.scanners.sast && state.sastProjectName) a.push({flag:"--sast-project-name", value:state.sastProjectName});
  if((state.scanners.sca||state.scanners.containers) && state.cxProjectName) a.push({flag:"--cx-project-name", value:state.cxProjectName});
  // Branch: explicit value if given; else for a CI target wire the CI's native
  // branch variable so the build's branch is fed correctly (the orchestrator's
  // auto-detection is unreliable on some CIs, notably Jenkins). Windows CI agents
  // keep auto-detection (the var syntax differs); local relies on git.
  if(state.branch) a.push({flag:"--branch", value:state.branch});
  else if(state.target!=="local" && state.os!=="windows" && TARGETS[state.target] && TARGETS[state.target].branchVar)
    a.push({flag:"--branch", value:TARGETS[state.target].branchVar, branchExpr:true});
  // filters
  for(const name in state.filters){ const v=state.filters[name]; if(!v) continue;
    if(name==="use-gitignore"){ if(v) a.push({flag:"--use-gitignore", value:null}); } else a.push({flag:"--"+name, value:v}); }
  // output — per-scanner report formats. Emit --<engine>-report-formats only when a
  // scanner's selection differs from its effective default (json,sarif ∩ supported);
  // the implicit global default covers the rest, keeping the command clean.
  for(const e of selectedEngines()){
    const info=engineFmtInfo(e);
    const map=state.engineFormats[e]||effectiveDefaultFormats(e);
    let sel=Object.keys(map).filter(f=>map[f]);
    if(info.mandatory && !sel.includes(info.mandatory)) sel=[info.mandatory, ...sel]; // mandatory always emitted
    const def=Object.keys(effectiveDefaultFormats(e));
    if(!sameSet(sel, def)) a.push({flag:"--"+e+"-report-formats", value:sel.join(",")});
  }
  const outP = effectiveOutputPath();
  if(outP) a.push({flag:"--output-path", value:outP});
  if(state.outputName) a.push({flag:"--output-name", value:state.outputName});
  if(state.ignoreOnExit) a.push({flag:"--ignore-on-exit", value:state.ignoreOnExit});
  // orchestration
  if(state.parallel && state.parallel!=="0") a.push({flag:"--parallel", value:state.parallel});
  if(state.failFast) a.push({flag:"--fail-fast", value:null});
  if(state.timeout) a.push({flag:"--timeout", value:state.timeout});
  if(state.onMissing) a.push({flag:"--on-missing", value:state.onMissing});
  if(state.conflict) a.push({flag:"--conflict", value:state.conflict});
  if(state.async) a.push({flag:"--async", value:null});
  // auth — selectors only (names, not secrets)
  if(state.auth==="apikey"){ if(state.authEnv.apikey && state.authEnv.apikey!=="CX1_APIKEY") a.push({flag:"--cx-apikey-env", value:state.authEnv.apikey}); }
  else if(state.auth==="client-creds"){
    if(state.authEnv.clientId) a.push({flag:"--cx-client-id", value:state.authEnv.clientId});
    if(state.authEnv.clientSecretEnv) a.push({flag:"--cx-client-secret-env", value:state.authEnv.clientSecretEnv});
    if(state.authEnv.baseUri) a.push({flag:"--cx-base-uri", value:state.authEnv.baseUri});
    if(state.authEnv.baseAuthUri) a.push({flag:"--cx-base-auth-uri", value:state.authEnv.baseAuthUri});
    if(state.authEnv.tenant) a.push({flag:"--cx-tenant", value:state.authEnv.tenant});
  }
  // sast auth (only meaningful if sast selected)
  if(state.scanners.sast){
    if(state.sast.server) a.push({flag:"--sast-server", value:state.sast.server});
    if(state.sast.user) a.push({flag:"--sast-user", value:state.sast.user}); // username is not a secret → direct
    if(state.sast.passEnv && state.sast.passEnv!=="CXSAST_PASSWORD") a.push({flag:"--sast-password-env", value:state.sast.passEnv});
    if(state.sast.team) a.push({flag:"--sast-team", value:state.sast.team});
    if(state.sast.java) a.push({flag:"--sast-java", value:state.sast.java});
  }
  // native tool paths (only for native runtime — the fat image sets these via env)
  if(state.runtime==="native"){
    if(state.scanners.sca && state.tools.scaResolver) a.push({flag:"--sca-resolver", value:state.tools.scaResolver});
    if(state.scanners.sast && state.tools.sastPath) a.push({flag:"--sast-path", value:state.tools.sastPath});
    if(state.scanners.kics && state.tools.kicsQueries) a.push({flag:"--kics-queries", value:state.tools.kicsQueries});
  }
  // passthrough
  for(const p of state.passthrough){ if(p.engine && p.value) a.push({flag:"--"+p.engine+"-arg", value:p.value, raw:true}); }
  return a;
}

/* env var NAMES the run needs (for container -e and CI env: blocks). */
function envNames(){
  const s=new Set();
  if(state.auth==="apikey") s.add(state.authEnv.apikey||"CX1_APIKEY");
  if(state.auth==="client-creds"){ if(state.authEnv.clientSecretEnv) s.add(state.authEnv.clientSecretEnv); }
  if(state.scanners.sast){
    if(!state.sast.user) s.add(state.sast.userEnv||"CXSAST_USERNAME"); // username only via env when not passed directly
    s.add(state.sast.passEnv||"CXSAST_PASSWORD"); // password is a secret → always env
    if(state.sast.server==="") s.add("CXSAST_URL"); }
  return [...s].filter(Boolean);
}

/* render arg pairs into one shell/pwsh/plain string with continuations */
function renderArgs(pairs, mode, indent){
  const q = mode==="pwsh"?qPwsh : mode==="yaml"?qYaml : qBash;
  const cont = mode==="pwsh" ? " `" : mode==="yaml" ? "" : " \\";
  const pad = " ".repeat(indent||0);
  const toks = pairs.map(p=> argTok(p, q));
  if(mode==="yaml"){ // join, wrapped, inside a block scalar — backslash continuations are fine in shell within | block
    return toks.map((t,i)=> pad + t + (i<toks.length-1? " \\":"")).join("\n");
  }
  return toks.map((t,i)=> pad + t + (i<toks.length-1? cont:"")).join("\n");
}

/* ---------- renderers ---------- */
const BIN_NIX = "cx-onprem-orchestrator";
const BIN_WIN = "cx-onprem-orchestrator.exe";

function dockerPodmanRun(pairs, runtime, os){
  const bin = runtime==="podman"?"podman":"docker";
  const mount = (runtime==="podman") ? '"$PWD":/work:Z' : '"$PWD":/work';
  const evs = envNames().map(n=>"-e "+n).join(" ");
  const head = `${bin} run --rm -v ${mount} -w /work \\\n  ${evs} \\\n  ${IMG} run`;
  return head + " \\\n" + renderArgs(pairs, "bash", 2);
}

function localRender(pairs){
  const notes=[];
  if(state.os==="windows" && state.runtime!=="native"){
    notes.push({k:"warn", t:"On Windows, containers need a Linux VM (WSL2/Hyper-V). Windows Server 2016 supports neither — use the native binary there. Podman also needs a one-time <code>podman machine init &amp;&amp; podman machine start</code>."});
  }
  if(state.runtime==="native"){
    const bin = state.os==="windows"?BIN_WIN:BIN_NIX;
    const mode = state.os==="windows"?"pwsh":"bash";
    const evhint = "# Provide secrets as environment variables first (never on the command line):\n" +
      envNames().map(n=> state.os==="windows" ? `#   $env:${n} = "…"` : `#   export ${n}=…`).join("\n");
    notes.push({k:"info", t:"Native path: install the engine tools + a JRE 11+ on the host. See <a href=\"https://github.com/cx-michael-pogrebisky/cx-onprem-orchestrator/blob/main/docs/ci/windows.md\">windows.md</a> / docs."});
    return { text: evhint+"\n"+bin+" run"+(mode==="pwsh"?" `":" \\")+"\n"+renderArgs(pairs, mode, 2), notes, fname:null };
  }
  // docker / podman
  const evhint = "# Export the referenced secrets in your shell first (values never go on argv):\n" +
    envNames().map(n=>"#   export "+n+"=…").join("\n");
  return { text: evhint+"\n"+dockerPodmanRun(pairs, state.runtime, state.os), notes, fname:null };
}

/* YAML env block for CI secret wiring (names only). */
function envBlockYaml(indent, valTemplate){
  const pad=" ".repeat(indent);
  return envNames().map(n=> `${pad}${n}: ${valTemplate(n)}`).join("\n");
}

function ciContainerScript(pairs, runtime, indent){
  // a `docker/podman run ...` invocation suitable for a script step
  return dockerPodmanRun(pairs, runtime, "linux").split("\n").map(l=>" ".repeat(indent)+l).join("\n");
}

function nativeWinScript(pairs, shell, indent){
  const mode = shell==="bat" ? "bat" : "pwsh";
  if(mode==="bat"){
    // single line: cmd has no continuation
    const toks = pairs.map(p=> p.value===null?p.flag : p.raw?p.flag+"="+(needsQuote(p.value)?'"'+p.value+'"':p.value) : p.flag+" "+(needsQuote(p.value)?'"'+p.value+'"':p.value));
    return " ".repeat(indent)+BIN_WIN+" run "+toks.join(" ");
  }
  const body = renderArgs(pairs,"pwsh",indent+2);
  return " ".repeat(indent)+BIN_WIN+" run `\n"+body;
}

/* main CI renderer */
function ciRender(){
  const d=TARGETS[state.target]; const pairs=buildArgPairs(); const notes=[]; if(d.note) notes.push({k:"info",t:d.note});
  const win = state.os==="windows";
  if(win && !d.winHosted) notes.push({k:"warn", t:`${d.label} has no hosted Windows runners — use ${d.winLabel} (self-hosted) with the native binary.`});
  if(win && d.winIsContainer) notes.push({k:"warn", t:"This CI's Windows environment is a Windows container and cannot run the linux/amd64 image — the snippet uses the native binary."});
  if(!win && d.linuxOnlyCloud) notes.push({k:"ok", t:"Cloud is Linux/Docker — the fat image works directly here."});
  let text="";
  if(win){
    text = winYaml(d, pairs);
  } else {
    text = linuxYaml(d, pairs);
  }
  return { text, notes, fname:d.file };
}

  }

  return [

"cx-onprem-orchestrator run "+pairs.map(p=>argTok(p,qBash)).join(" "),
`'''`,

`    }`,
`  }`,
`  post { always { archiveArtifacts artifacts: '${effectiveOutputPath()}/**', allowEmptyArchive: true } }`,
`}`,
  ].join("\n");
}

/* ---------- top-level render ---------- */
// validationErrors returns BLOCKING problems that make the output unusable as-is
// (plain text, so it is safe to embed in the output banner and the notes).
function validationErrors(){
  const errs=[];
  if(selectedEngines().length===0)
    errs.push("Select at least one engine — --scanners is required.");
  if(state.async && thresholdString())
    errs.push("--async is incompatible with --threshold (gating needs synchronous scans).");
  // OAuth2 client-credentials must be COMPLETE when a Cx1 engine (SCA/Containers) runs.
  if(state.auth==="client-creds" && (state.scanners.sca || state.scanners.containers)){
    const miss=[];
    if(!state.authEnv.clientId)        miss.push("--cx-client-id");
    if(!state.authEnv.clientSecretEnv) miss.push("--cx-client-secret-env (secret env-var name)");
    if(!state.authEnv.baseUri)         miss.push("--cx-base-uri");
    if(!state.authEnv.baseAuthUri)     miss.push("--cx-base-auth-uri");
    if(!state.authEnv.tenant)          miss.push("--cx-tenant");
    if(miss.length)
      errs.push("OAuth2 client-credentials is INCOMPLETE — missing: "+miss.join(", ")+
        ". Fill these (or switch Cx1 auth to API key); the configuration below cannot be used as-is.");
  }
  // Native runtime: explicit resource paths that have no PATH fallback. The fat
  // image (docker/podman) provides these via $CXOO_*, so only check native.
  if(state.runtime==="native"){
    if(state.scanners.sast && !state.tools.sastPath)
      errs.push("SAST (native runtime): the CxConsolePlugin path is missing — set --sast-path (or $CXOO_SAST_PATH).");
    if(state.scanners.sca && !state.tools.scaResolver)
      errs.push("SCA (native runtime): the ScaResolver path is missing — set --sca-resolver (or $CXOO_SCA_RESOLVER).");
    if(state.scanners.kics && !state.tools.kicsQueries)
      errs.push("KICS (native runtime): the query-assets path is missing — set --kics-queries (or $CXOO_KICS_QUERIES_PATH).");
  }
  return errs;
}

// markRequired adds/removes the red highlight on empty required client-creds fields.
function markRequired(){
  const need = state.auth==="client-creds" && (state.scanners.sca || state.scanners.containers);
  const fields = {
    cc_clientId: state.authEnv.clientId, cc_clientSecretEnv: state.authEnv.clientSecretEnv,
    cc_baseUri: state.authEnv.baseUri, cc_baseAuthUri: state.authEnv.baseAuthUri, cc_tenant: state.authEnv.tenant,
  };
  for(const id in fields){
    const e=document.getElementById(id);
    if(e && e.classList) e.classList.toggle("bad-input", need && !fields[id]);
  }
  // Native-runtime resource paths.
  const nat = state.runtime==="native";
  const ntf = {
    nt_sastPath:    state.scanners.sast && !state.tools.sastPath,
    nt_scaResolver: state.scanners.sca && !state.tools.scaResolver,
    nt_kicsQueries: state.scanners.kics && !state.tools.kicsQueries,
  };
  for(const id in ntf){
    const e=document.getElementById(id);
    if(e && e.classList) e.classList.toggle("bad-input", nat && ntf[id]);
  }
}

function render(){
  let r;
  if(state.target==="local") r=localRender(buildArgPairs());
  else r=ciRender();
  const errs = validationErrors();

  let text = r.text;
  if(errs.length){
    const banner = "##### ⚠ INCOMPLETE CONFIGURATION — DO NOT USE AS-IS #####\n"
      + errs.map(e=>"##### "+e).join("\n")
      + "\n##### Resolve the highlighted issue(s) above; the command below is missing required parameters.\n\n";
    text = banner + text;
  }
  document.getElementById("output").textContent = text;
  document.getElementById("filename").textContent = r.fname || "";

  // Visual flags: heading + output border turn red when incomplete.
  const head=document.getElementById("outHead");
  if(head){ head.textContent = errs.length ? "Generated configuration — ⚠ INCOMPLETE" : "Generated configuration"; head.classList.toggle("bad", errs.length>0); }
  const box=document.querySelector(".out"); if(box && box.classList) box.classList.toggle("incomplete", errs.length>0);
  markRequired();

  const nz=document.getElementById("notes"); nz.innerHTML="";
  for(const e of errs) nz.append(el("div",{class:"note err", html:e}));   // blocking errors first (red)
  for(const n of (r.notes||[])) nz.append(el("div",{class:"note "+(n.k||""),html:n.t}));
  window._cxooFilename = r.fname;
}

/* ---------- build the form ---------- */
function seg(opts, cur, on){ const w=el("div",{class:"seg"});
  for(const o of opts){ const b=el("button",{},o.label); if(o.id===cur)b.classList.add("on"); if(o.disabled)b.disabled=true;
    b.onclick=()=>{ on(o.id); }; w.append(b);} return w; }

function buildForm(){
  const f=document.getElementById("form"); f.innerHTML="";

  // Target / OS / Runtime
  const fsTarget=el("fieldset",{}, el("legend",{},"Target & environment"));
  fsTarget.append(el("label",{},"CI / CD target"));
  const tsel=el("select",{});
  for(const k in TARGETS) tsel.append(el("option",{value:k}, TARGETS[k].label));
  tsel.value=state.target; tsel.onchange=()=>{ state.target=tsel.value; syncRuntimeForTarget(); buildForm(); render(); };
  fsTarget.append(tsel);
  fsTarget.append(el("label",{},"Operating system"));
  fsTarget.append(seg(OSES, state.os, id=>{ state.os=id; syncRuntimeForTarget(); buildForm(); render(); }));
  fsTarget.append(el("label",{},"Runtime"));
  const rtOpts=[
    {id:"docker", label:"Docker (fat image)"},
    {id:"podman", label:"Podman (fat image)"},
    {id:"native", label:"Native binary"},
  ];
  // Windows + container forces caveats; Server2016 native — leave to notes.
  fsTarget.append(seg(rtOpts, state.runtime, id=>{ state.runtime=id; buildForm(); render(); }));
  fsTarget.append(el("div",{class:"hint", html:"The fat image is <code>linux/amd64</code>. On Windows, containers need WSL2/Hyper-V; the <b>native binary</b> is the universal Windows path. <a href=\"https://github.com/cx-michael-pogrebisky/cx-onprem-orchestrator/blob/main/docs/ci.md#container-runtime--docker-or-podman\">Docker vs Podman</a>."}));
  f.append(fsTarget);

  // Engines (kept above Project & team).
  const fsEng=el("fieldset",{}, el("legend",{},"Engines (--scanners)"));
  const chips=el("div",{class:"chips"});
  for(const e of SCHEMA.engines){ const id="eng_"+e;
    const lab=el("label",{class:"chip"+(state.scanners[e]?" on":"")});
    const cb=el("input",{type:"checkbox"}); cb.checked=!!state.scanners[e];
    cb.onchange=()=>{ state.scanners[e]=cb.checked; lab.classList.toggle("on",cb.checked); render(); };
    lab.append(cb, ENGINE_LABELS[e]||e); chips.append(lab); }
  fsEng.append(chips);
  f.append(fsEng);

  // Project & team — most-used fields.
  const fsProj=el("fieldset",{}, el("legend",{},"Project & team — most used"));
  fsProj.append(field("Project name — default for all engines (--project-name)","projectName","derived from repo if blank"));
  fsProj.append(field("CxSAST project name (--sast-project-name)","sastProjectName","overrides project name for CxSAST"));
  fsProj.append(field("CxSAST team (--sast-team)","sast.team","default CxServer"));
  fsProj.append(field("Cx1 project name — SCA & Container Security (--cx-project-name)","cxProjectName","overrides project name for Cx1"));
  fsProj.append(field("Branch (--branch)","branch","CI-detected if blank"));
  fsProj.append(el("div",{class:"hint",html:"CxSAST and Cx1 can use <b>separate</b> project names — fill the overrides, or leave them blank to use one name everywhere. CxSAST's project is <code>&lt;team&gt;\\&lt;name&gt;</code>, e.g. <code>CxServer\\&lt;name&gt;</code>."}));
  f.append(fsProj);

  // CxSAST connection — literal non-secret values (server URL + username).
  if(state.scanners.sast){
    const fsConn=el("fieldset",{}, el("legend",{},"CxSAST connection — non-secret values"));
    fsConn.append(field("CxSAST server URL (--sast-server)","sast.server","e.g. http://cxsast.internal — or blank to use $CXSAST_URL"));
    fsConn.append(field("CxSAST username (--sast-user)","sast.user","e.g. svc-checkmarx — or blank to use $CXSAST_USERNAME"));
    fsConn.append(el("div",{class:"hint",html:"These are <b>not secrets</b> — type the literal values here (they go on the command line), or leave blank to read <code>$CXSAST_URL</code> / <code>$CXSAST_USERNAME</code> from the environment. The CxSAST <b>password</b> stays a secret (set its env-var name under <i>Authentication</i>)."}));
    f.append(fsConn);
  }

  // Context
  const fsCtx=el("fieldset",{}, el("legend",{},"Context (optional — CI auto-detects)"));
  fsCtx.append(field("Source path (--source)","source","e.g. . or $CI_WORKSPACE"));
  f.append(fsCtx);

  // Thresholds
  const fsThr=el("fieldset",{}, el("legend",{},"Thresholds (--threshold)"));
  const thrWrap=el("div",{}); fsThr.append(thrWrap);
  function drawThr(){ thrWrap.innerHTML="";
    state.thresholds.forEach((t,i)=>{
      const row=el("div",{class:"thr-row"});
      const eng=el("select",{}); ["sast","sca","iac-security","containers","secrets-total"].forEach(o=>eng.append(el("option",{value:o},o)));
      eng.value=t.engine; eng.onchange=()=>{ t.engine=eng.value; render(); };
      const sev=el("select",{}); SCHEMA.severities.forEach(s=>sev.append(el("option",{value:s},s)));
      sev.value=t.sev; sev.onchange=()=>{ t.sev=sev.value; render(); };
      sev.disabled = (t.engine==="secrets-total");
      const lim=el("input",{type:"number",min:"1",value:t.limit}); lim.oninput=()=>{ t.limit=lim.value; render(); };
      const del=el("button",{class:"mini"},"✕"); del.onclick=()=>{ state.thresholds.splice(i,1); drawThr(); render(); };
      row.append(eng,sev,lim,del); thrWrap.append(row);
    });
  }
  drawThr();
  const add=el("button",{class:"add"},"+ add threshold"); add.onclick=()=>{ state.thresholds.push({engine:"sast",sev:"high",limit:"10"}); drawThr(); render(); };
  fsThr.append(add);
  fsThr.append(el("div",{class:"hint",html:"Inclusive (<code>&ge;</code>), limit &ge; 1. <code>secrets-total</code> ignores severity."}));
  f.append(fsThr);

  // Filters
  const fsFil=el("fieldset",{}, el("legend",{},"Filters (optional)"));
  const filFlags=SCHEMA.flags.filter(x=>x.group==="filters");
  const gi=el("label",{class:"chip"+(state.filters["use-gitignore"]?" on":"")});
  const gicb=el("input",{type:"checkbox"}); gicb.checked=!!state.filters["use-gitignore"];
  gicb.onchange=()=>{ state.filters["use-gitignore"]=gicb.checked; gi.classList.toggle("on",gicb.checked); render(); };
  gi.append(gicb,"--use-gitignore"); fsFil.append(el("div",{class:"chips"},gi));
  for(const ff of filFlags){ if(ff.name==="use-gitignore")continue;
    fsFil.append(field("--"+ff.name, "filter:"+ff.name, ff.usage)); }
  f.append(fsFil);

  // Output
  const fsOut=el("fieldset",{}, el("legend",{},"Output"));
  fsOut.append(el("label",{},"Report formats — per scanner"));
  const rfWrap=el("div",{});
  const selForFmt = SCHEMA.engines.filter(e=>state.scanners[e]);
  if(selForFmt.length===0) rfWrap.append(el("div",{class:"hint",html:"Select an engine above to choose its report formats."}));
  for(const e of selForFmt){
    const info=engineFmtInfo(e);
    state.engineFormats[e]=state.engineFormats[e]||effectiveDefaultFormats(e);
    const grp=el("div",{class:"fmt-group"});
    grp.append(el("div",{class:"fmt-eng"}, ENGINE_LABELS[e]||e));
    const chips=el("div",{class:"chips"});
    for(const fmt of info.supported){
      const isMand=(fmt===info.mandatory);
      const on=!!state.engineFormats[e][fmt]||isMand;
      const lab=el("label",{class:"chip"+(on?" on":"")});
      const cb=el("input",{type:"checkbox"}); cb.checked=on; cb.disabled=isMand;
      cb.onchange=()=>{ state.engineFormats[e][fmt]=cb.checked; lab.classList.toggle("on",cb.checked); render(); };
      lab.append(cb, fmt+(isMand?" *":"")); chips.append(lab);
    }
    grp.append(chips); rfWrap.append(grp);
  }
  fsOut.append(rfWrap);
  fsOut.append(el("div",{class:"hint",html:"<code>*</code> = mandatory (always emitted). Each scanner shows only the formats it supports; defaults are <code>json,sarif</code> where available (CxSAST: <code>xml</code>)."}));
  fsOut.append(field("Output path (--output-path)","outputPath", state.target==="local" ? "blank = a sibling dir OUTSIDE the scanned source" : "blank = cxoo-reports (in-workspace, excluded from scans)"));
  fsOut.append(el("div",{class:"hint",html:"Reports are kept <b>out of the scanned tree</b> so they're never scanned (e.g. 2ms re-finding its own secrets). Left blank: locally they go to a <b>sibling</b> of the source; in CI to a distinctive <code>cxoo-reports</code> dir the orchestrator <b>excludes</b> from SAST/KICS/secrets (so artifacts still upload). A path <i>inside</i> the source is auto-excluded with a warning."}));
  fsOut.append(field("Output name","outputName","default cxoo"));
  fsOut.append(el("label",{},"ignore-on-exit"));
  const ioe=el("select",{}); ["","none","results","errors","all"].forEach(o=>ioe.append(el("option",{value:o},o||"(default)")));
  ioe.value=state.ignoreOnExit; ioe.onchange=()=>{ state.ignoreOnExit=ioe.value; render(); }; fsOut.append(ioe);
  f.append(fsOut);

  // Orchestration
  const fsOrc=el("fieldset",{}, el("legend",{},"Orchestration"));
  fsOrc.append(field("Parallel engines (--parallel)","parallel","0 = sequential"));
  const ffl=el("label",{class:"chip"+(state.failFast?" on":"")}); const ffc=el("input",{type:"checkbox"}); ffc.checked=state.failFast;
  ffc.onchange=()=>{ state.failFast=ffc.checked; ffl.classList.toggle("on",ffc.checked); render(); }; ffl.append(ffc,"--fail-fast");
  const asl=el("label",{class:"chip"+(state.async?" on":"")}); const asc=el("input",{type:"checkbox"}); asc.checked=state.async;
  asc.onchange=()=>{ state.async=asc.checked; asl.classList.toggle("on",asc.checked); render(); }; asl.append(asc,"--async");
  fsOrc.append(el("div",{class:"chips"}, ffl, asl));
  fsOrc.append(field("Timeout (--timeout)","timeout","e.g. 30m"));
  f.append(fsOrc);

  // Auth
  const fsAuth=el("fieldset",{}, el("legend",{},"Authentication"));
  fsAuth.append(el("div",{class:"hint",html:"Only <b>real secrets</b> — the <b>Cx1 API key</b>, <b>Cx1 client secret</b>, and <b>CxSAST password</b> (and token) — are referenced by <b>env-var name</b> and never put on the command line. Everything else (server, username, tenant, IDs) is a direct value."}));
  fsAuth.append(el("label",{},"Cx1 auth (SCA / Containers)"));
  fsAuth.append(seg([{id:"apikey",label:"API key"},{id:"client-creds",label:"OAuth2 client-credentials"}], state.auth, id=>{ state.auth=id; buildForm(); render(); }));
  if(state.auth==="apikey"){ fsAuth.append(field("API-key env var (--cx-apikey-env)","authEnv.apikey","CX1_APIKEY")); }
  else { fsAuth.append(el("div",{class:"hint",html:"OAuth2 client-credentials needs <b>all</b> of: client ID, client-secret env-var name, base URI, auth URI, tenant. Empty required fields are highlighted and the output is marked incomplete until filled."}));
    fsAuth.append(field("Client ID (--cx-client-id)","authEnv.clientId","required","cc_clientId"));
    fsAuth.append(field("Client-secret env (--cx-client-secret-env)","authEnv.clientSecretEnv","required — secret env-var name","cc_clientSecretEnv"));
    fsAuth.append(field("Base URI (--cx-base-uri)","authEnv.baseUri","required, e.g. https://<region>.ast.checkmarx.net","cc_baseUri"));
    fsAuth.append(field("Auth URI (--cx-base-auth-uri)","authEnv.baseAuthUri","required, e.g. https://<region>.iam.checkmarx.net","cc_baseAuthUri"));
    fsAuth.append(field("Tenant (--cx-tenant)","authEnv.tenant","required","cc_tenant")); }
  if(state.scanners.sast){
    fsAuth.append(el("div",{class:"hint",html:"<b>CxSAST</b> secret — set the password env-var name (server &amp; username are in <i>CxSAST connection</i> above):"}));
    fsAuth.append(field("CxSAST password env-var name (--sast-password-env)","sast.passEnv","secret — referenced by name, never a value"));
    if(state.runtime==="native") fsAuth.append(field("Java (--sast-java)","sast.java","path to java(.exe) or JAVA_HOME"));
  }
  f.append(fsAuth);

  // Native tool paths
  if(state.runtime==="native"){
    const fsTool=el("fieldset",{}, el("legend",{},"Native tool paths — required in native runtime"));
    if(state.scanners.sca) fsTool.append(field("ScaResolver (--sca-resolver)","tools.scaResolver","path to ScaResolver(.exe) — needs Configuration.yml beside it","nt_scaResolver"));
    if(state.scanners.sast) fsTool.append(field("CxConsolePlugin (--sast-path)","tools.sastPath","plugin dir or jar","nt_sastPath"));
    if(state.scanners.kics) fsTool.append(field("KICS query assets (--kics-queries)","tools.kicsQueries","path to the kics assets/queries dir","nt_kicsQueries"));
    fsTool.append(el("div",{class:"hint",html:"These resource paths have no PATH fallback — provide them (or the matching <code>$CXOO_SCA_RESOLVER</code> / <code>$CXOO_SAST_PATH</code> / <code>$CXOO_KICS_QUERIES_PATH</code>). Also install cx, kics, 2ms and a JRE 11+ on the agent (on PATH). See <a href=\"https://github.com/cx-michael-pogrebisky/cx-onprem-orchestrator/blob/main/docs/ci/windows.md\">docs</a>."}));
    f.append(fsTool);
  }

  // Passthrough
  const fsPt=el("fieldset",{}, el("legend",{},"Raw passthrough (--<engine>-arg)"));
  const ptWrap=el("div",{}); fsPt.append(ptWrap);
  function drawPt(){ ptWrap.innerHTML="";
    state.passthrough.forEach((p,i)=>{ const row=el("div",{class:"pass-row"});
      const eng=el("select",{}); ["sast","sca","kics","secrets","containers","sca-resolver"].forEach(o=>eng.append(el("option",{value:o},o)));
      eng.value=p.engine; eng.onchange=()=>{ p.engine=eng.value; render(); };
      const val=el("input",{type:"text",value:p.value,placeholder:"e.g. -ReportPDF=report.pdf"}); val.oninput=()=>{ p.value=val.value; render(); };
      const del=el("button",{class:"mini"},"✕"); del.onclick=()=>{ state.passthrough.splice(i,1); drawPt(); render(); };
      row.append(eng,val,del); ptWrap.append(row);
    });
  }
  drawPt();
  const addPt=el("button",{class:"add"},"+ add passthrough arg"); addPt.onclick=()=>{ state.passthrough.push({engine:"sast",value:""}); drawPt(); render(); };
  fsPt.append(addPt);
  fsPt.append(el("div",{class:"hint",html:"Forwarded verbatim after wrapper-translated args (=-bound)."}));
  f.append(fsPt);
}

/* a labelled text input bound to a dotted state path (optional id for validation) */
function field(labelText, path, placeholder, id){
  const wrap=el("div",{});
  wrap.append(el("label",{}, labelText));
  const inp=el("input",{type:"text", placeholder:placeholder||""});
  if(id) inp.id=id;
  inp.value = getPath(path); inp.oninput=()=>{ setPath(path, inp.value); render(); };
  wrap.append(inp);
  return wrap;
}
function getPath(path){
  if(path.startsWith("filter:")) return state.filters[path.slice(7)]||"";
  return path.split(".").reduce((o,k)=>o&&o[k]!==undefined?o[k]:"", state);
}
function setPath(path, val){
  if(path.startsWith("filter:")){ state.filters[path.slice(7)]=val; return; }
  const ks=path.split("."); let o=state; for(let i=0;i<ks.length-1;i++) o=o[ks[i]]; o[ks[ks.length-1]]=val;
}

function syncRuntimeForTarget(){
  const d=TARGETS[state.target];
  // On Windows, force native (the universal correct path) unless user picks otherwise — but keep their choice; notes will warn.
  if(state.target==="codebuild" && state.os==="windows") state.runtime="native";
}

/* ---------- toolbar ---------- */
// Copy with a fallback: the async Clipboard API needs a secure context (https or
// localhost) and isn't available on file:// in some browsers, so fall back to a
// temporary <textarea> + execCommand('copy') (works on older Safari/Edge/Firefox).
async function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext){
    try{ await navigator.clipboard.writeText(text); return true; }catch(e){/* fall through */}
  }
  try{
    const ta=document.createElement("textarea");
    ta.value=text; ta.setAttribute("readonly","");
    ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok=document.execCommand("copy"); document.body.removeChild(ta); return ok;
  }catch(e){ return false; }
}
document.getElementById("copyBtn").onclick=async()=>{
  const ok=await copyText(document.getElementById("output").textContent);
  setCopy(ok ? "Copied ✓" : "Copy failed — select the text manually");
};
document.getElementById("dlBtn").onclick=()=>{
  const blob=new Blob([document.getElementById("output").textContent],{type:"text/plain"});
  const a=el("a",{href:URL.createObjectURL(blob), download:(window._cxooFilename||"checkmarx-config.txt").split("/").pop()});
  document.body.append(a); a.click(); a.remove();
};
function setCopy(m){ const s=document.getElementById("copyState"); s.textContent=m; setTimeout(()=>s.textContent="",2000); }

document.getElementById("schemaVer").textContent = "Flags: "+SCHEMA.flags.length+" · engines: "+SCHEMA.engines.join("/");

/* Theme picker: Light / Dark / System (System follows the OS/browser and adapts
   live). Persisted in localStorage. Guarded so the headless test harness is happy. */
(function(){
  const KEY="cxoo-theme";
  function saved(){ try{ return localStorage.getItem(KEY); }catch(e){ return null; } }
  function apply(t){
    try{ if(document.documentElement) document.documentElement.setAttribute("data-theme", t); }catch(e){}
    try{ localStorage.setItem(KEY, t); }catch(e){}
  }
  const sel=document.getElementById("theme");
  if(sel){ sel.value=saved()||"system"; apply(sel.value); sel.onchange=()=>apply(sel.value); }
})();

/* In-browser self-test — open the page with #selftest to run it in YOUR browser.
   Drives representative configs through the real render path and shows a PASS/FAIL
   banner. Used by the headless cross-browser tests (Chrome/Edge, Firefox) and
   handy for verifying an exotic browser. No effect on the normal page. */
function runSelfTest(){
  const snapshot = JSON.stringify(state);
  const reset = () => Object.assign(state, JSON.parse(snapshot));
  const results = [];
  function scn(name, mut, asserts){
    reset(); if(mut) mut(); render();
    const out = document.getElementById("output").textContent;
    const notes = document.getElementById("notes").textContent || "";
    let ok=true, msg="";
    for(const a of asserts){ if(!a.c(out, notes)){ ok=false; msg+=" ["+a.d+"]"; } }
    results.push({name, ok, msg});
  }
  const has=(s)=>(o)=>o.includes(s);
  scn("local·linux·docker", ()=>{}, [{d:"docker run",c:has("docker run --rm")},{d:"-e CX1_APIKEY",c:has("-e CX1_APIKEY")},{d:"scanners all",c:has("--scanners all")}]);
  scn("local·linux·podman", ()=>{state.runtime="podman";}, [{d:"podman run",c:has("podman run --rm")},{d:":Z mount",c:has(":/work:Z")}]);
  scn("local·win·native", ()=>{state.os="windows";state.runtime="native";}, [{d:".exe",c:has("cx-onprem-orchestrator.exe run")},{d:"backtick",c:has(" `")}]);
  scn("win·docker warns", ()=>{state.os="windows";state.runtime="docker";}, [{d:"WSL2 note",c:(o,n)=>n.includes("WSL2")}]);
  scn("github·linux", ()=>{state.target="github";}, [{d:"ubuntu",c:has("runs-on: ubuntu-latest")},{d:"secrets env",c:has("${{ secrets.CX1_APIKEY }}")}]);
  scn("github·win·native", ()=>{state.target="github";state.os="windows";state.runtime="native";}, [{d:"windows-latest",c:has("runs-on: windows-latest")},{d:".exe",c:has("cx-onprem-orchestrator.exe")}]);
  scn("jenkins groovy", ()=>{state.target="jenkins";}, [{d:"pipeline{",c:has("pipeline {")},{d:"credentials",c:has("credentials(")}]);
  scn("codebuild·win native", ()=>{state.target="codebuild";state.os="windows";}, [{d:".exe",c:has("cx-onprem-orchestrator.exe")},{d:"win-container note",c:(o,n)=>n.toLowerCase().includes("windows container")}]);
  scn("project+team flags", ()=>{state.projectName="myapp";state.sast.team="CxServer/SP";}, [{d:"--project-name",c:has("--project-name myapp")},{d:"--sast-team",c:has("--sast-team CxServer/SP")}]);
  scn("default team is CxServer", ()=>{}, [{d:"--sast-team CxServer",c:has("--sast-team CxServer")}]);
  scn("separate project names", ()=>{state.projectName="base";state.sastProjectName="sastproj";state.cxProjectName="cxproj";}, [{d:"--sast-project-name",c:has("--sast-project-name sastproj")},{d:"--cx-project-name",c:has("--cx-project-name cxproj")}]);
  scn("per-scanner formats: SCA json-only", ()=>{state.engineFormats.sca={json:true};}, [{d:"--sca-report-formats json",c:has("--sca-report-formats json")},{d:"no global --report-formats",c:(o)=>!o.includes("--report-formats ")}]);
  scn("per-scanner formats: SAST adds pdf", ()=>{state.engineFormats.sast={xml:true,pdf:true};}, [{d:"--sast-report-formats",c:(o)=>/--sast-report-formats (xml,pdf|pdf,xml)/.test(o)}]);
  scn("username on argv, password by env", ()=>{state.sast.user="admin";}, [{d:"--sast-user admin",c:has("--sast-user admin")},{d:"no CXSAST_USERNAME env",c:(o)=>!o.includes("CXSAST_USERNAME")},{d:"password still env",c:has("CXSAST_PASSWORD")}]);
  scn("literal server+username on argv", ()=>{state.sast.server="http://cx.local";state.sast.user="svc";}, [{d:"--sast-server",c:has("--sast-server http://cx.local")},{d:"--sast-user svc",c:has("--sast-user svc")}]);
  scn("oauth incomplete → flagged", ()=>{state.auth="client-creds";state.authEnv={apikey:"CX1_APIKEY",clientId:"id",clientSecretEnv:"CX_CLIENT_SECRET",baseUri:"",baseAuthUri:"",tenant:""};}, [{d:"INCOMPLETE banner",c:has("INCOMPLETE")},{d:"lists missing base-uri",c:(o,n)=>n.includes("--cx-base-uri")&&n.includes("--cx-tenant")}]);
  scn("native missing paths → flagged", ()=>{state.runtime="native";state.tools={scaResolver:"",sastPath:"",kicsQueries:""};}, [{d:"INCOMPLETE",c:has("INCOMPLETE")},{d:"names --sast-path",c:(o,n)=>n.includes("--sast-path")},{d:"names --sca-resolver",c:(o,n)=>n.includes("--sca-resolver")},{d:"names --kics-queries",c:(o,n)=>n.includes("--kics-queries")}]);
  scn("native paths provided → ok", ()=>{state.runtime="native";state.tools={scaResolver:"/o/sca/ScaResolver",sastPath:"/o/cxconsole",kicsQueries:"/o/kics/queries"};}, [{d:"no INCOMPLETE",c:(o)=>!o.includes("INCOMPLETE")},{d:"--sast-path emitted",c:has("--sast-path /o/cxconsole")},{d:"--kics-queries emitted",c:has("--kics-queries /o/kics/queries")}]);
  scn("docker runtime → native paths NOT required", ()=>{state.runtime="docker";state.tools={scaResolver:"",sastPath:"",kicsQueries:""};}, [{d:"no INCOMPLETE",c:(o)=>!o.includes("INCOMPLETE")}]);
  scn("oauth complete → no flag", ()=>{state.auth="client-creds";state.authEnv={apikey:"CX1_APIKEY",clientId:"id",clientSecretEnv:"CX_CLIENT_SECRET",baseUri:"https://a",baseAuthUri:"https://b",tenant:"t"};}, [{d:"no INCOMPLETE",c:(o)=>!o.includes("INCOMPLETE")},{d:"--cx-client-id id",c:has("--cx-client-id id")}]);
  scn("oauth incomplete but no Cx1 engine → OK", ()=>{state.auth="client-creds";state.scanners={sast:true,sca:false,kics:true,secrets:true,containers:false};state.authEnv={apikey:"CX1_APIKEY",clientId:"",clientSecretEnv:"",baseUri:"",baseAuthUri:"",tenant:""};}, [{d:"no INCOMPLETE (no sca/containers)",c:(o)=>!o.includes("INCOMPLETE")}]);
  scn("jenkins wires branch + checkout", ()=>{state.target="jenkins";state.branch="";}, [{d:"native branch var",c:has('--branch "${BRANCH_NAME:-${GIT_BRANCH#origin/}}"')},{d:"checkout scm",c:has("checkout scm")}]);
  scn("gitlab wires native branch", ()=>{state.target="gitlab";state.branch="";}, [{d:"$CI_COMMIT_REF_NAME",c:has('--branch "$CI_COMMIT_REF_NAME"')}]);
  scn("typed branch overrides", ()=>{state.target="github";state.branch="dev";}, [{d:"literal branch",c:has("--branch dev")},{d:"no env var",c:(o)=>!o.includes("GITHUB_REF_NAME")}]);
  scn("local keeps reports out of tree (no --output-path)", ()=>{state.target="local";state.outputPath="";}, [{d:"no --output-path",c:(o)=>!o.includes("--output-path")}]);
  scn("CI uses distinctive cxoo-reports (not 'reports')", ()=>{state.target="github";state.outputPath="";}, [{d:"--output-path cxoo-reports",c:has("--output-path cxoo-reports")},{d:"upload references it",c:has("path: cxoo-reports")}]);
  scn("no leaked secret token", ()=>{state.target="gitlab";}, [{d:"no JWT-shaped token",c:(o)=>!/eyJ[A-Za-z0-9._-]{12,}/.test(o)}]);
  reset(); render();

  const pass=results.filter(r=>r.ok).length, total=results.length;
  const fail=results.filter(r=>!r.ok).map(r=>" · "+r.name+r.msg).join("");
  const banner=el("div",{id:"selftest-result"});
  banner.textContent=(pass===total?"SELFTEST PASS ":"SELFTEST FAIL ")+pass+"/"+total+fail;
  banner.setAttribute("style","position:fixed;top:0;left:0;right:0;z-index:9999;padding:10px;font:13px ui-monospace,monospace;color:#fff;background:"+(pass===total?"#1a7f37":"#b62324"));
  document.body.append(banner);
  document.title=(pass===total?"SELFTEST PASS ":"SELFTEST FAIL ")+pass+"/"+total;
  try{ console.log(document.title+fail); }catch(e){}
}

buildForm(); render();
if(typeof location!=="undefined" && location.hash==="#selftest") runSelfTest();
</script>
